[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "cd /app/apps/mercato && yarn start"
preDeployCommand = "/bin/sh /app/docker/scripts/railway-entrypoint.sh"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
